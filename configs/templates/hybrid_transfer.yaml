experiment:
  mode: scheme3_transfer
transfer:
  enabled: true
  transfer_scheme: scheme3
  fixed_selection_rule: source_topF_last3
  fixed_expert_ids: []
  reuse_source_expert_weights: true
  freeze_fixed_experts: true
  accelerate_fixed_experts: false
  # fixed branch 内部 expert 级权重：来自源任务 A 的 fixed experts 频率
  fixed_expert_internal_weight_source: source_last3_counts
  fixed_branch_use_router_weights: false
  fixed_branch_independent_of_router: true
  # fixed/dynamic 分支融合权重：训练开始前按源任务 A 的专家质量占比一次性确定并固定
  branch_fusion_weight_source: source_task_expert_mass_ratio
  source_checkpoint_path: ""
model:
  moe:
    routing_mode: fixed_branch_dynamic_branch
