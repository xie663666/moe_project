experiment:
  mode: hybrid_transfer
  run_id: hyb_p05_medium_sized_mammals_to_small_mammals_E32_K6_F1_s1
  pair_group: main_strong_6
  pair_id: p05_medium_sized_mammals_to_small_mammals
  seed: 1
data:
  dataset_name: cifar100_superclass_task
  root: ./datasets
  task_name: small_mammals
  num_classes: 5
  val_ratio: 0.1
transfer:
  enabled: true
  source_task: medium_sized_mammals
  target_task: small_mammals
  source_ref_run_id: ref_medium_sized_mammals_E32_K6_s1
  source_stats_path: ./results/runs/ref_medium_sized_mammals_E32_K6_s1/expert_stats_last3.json
  fixed_selection_rule: source_topF_last3
  fixed_k: 1
  dynamic_k: 5
model:
  feature_dim: 256
  moe:
    num_experts: 32
    top_k: 6
    expert_mlp_hidden_dim: 512
train:
  epochs: 10
  batch_size: 128
  optimizer:
    lr: 0.001
    weight_decay: 0.0001
runtime:
  project_root: .
  save_dir: results/runs
  checkpoint_dir: checkpoints
  log_dir: logs
  num_workers: 2
