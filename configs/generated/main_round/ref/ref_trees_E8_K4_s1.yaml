experiment:
  mode: ref_dynamic
  run_id: ref_trees_E8_K4_s1
  pair_group: reference
  pair_id: null
  seed: 1
data:
  dataset_name: cifar100_superclass_task
  root: ./datasets
  val_ratio: 0.1
  num_classes: 5
  task_name: trees
  fine_classes:
  - maple_tree
  - oak_tree
  - palm_tree
  - pine_tree
  - willow_tree
transfer:
  enabled: false
  source_task: trees
  target_task: trees
  source_ref_run_id: ref_trees_E8_K4_s1
  source_stats_path: ''
  fixed_selection_rule: none
  fixed_k: 0
  dynamic_k: 4
model:
  feature_dim: 256
  moe:
    num_layers: 1
    expert_mlp_hidden_dim: 512
