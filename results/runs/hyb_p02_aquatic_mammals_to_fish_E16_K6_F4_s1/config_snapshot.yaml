experiment:
  mode: hybrid_transfer
  run_id: hyb_p02_aquatic_mammals_to_fish_E16_K6_F4_s1
  pair_group: main_strong_6
  pair_id: p02_aquatic_mammals_to_fish
  seed: 1
data:
  dataset_name: cifar100_superclass_task
  root: ./datasets
  val_ratio: 0.1
  num_classes: 5
  task_name: fish
  fine_classes:
  - aquarium_fish
  - flatfish
  - ray
  - shark
  - trout
transfer:
  enabled: true
  source_task: aquatic_mammals
  target_task: fish
  source_ref_run_id: ref_aquatic_mammals_E16_K6_s1
  source_stats_path: ./results/runs/ref_aquatic_mammals_E16_K6_s1/expert_stats_last3.json
  fixed_selection_rule: source_topF_last3
  fixed_k: 4
  dynamic_k: 2
model:
  feature_dim: 256
  moe:
    num_layers: 1
    expert_mlp_hidden_dim: 512
    num_experts: 16
    top_k: 6
  classifier:
    in_dim: 256
    out_dim: 5
train:
  epochs: 10
  batch_size: 128
  optimizer:
    lr: 0.001
    weight_decay: 0.0001
runtime:
  project_root: .
  save_dir: results/runs
  checkpoint_dir: checkpoints
  log_dir: logs
  num_workers: 2
