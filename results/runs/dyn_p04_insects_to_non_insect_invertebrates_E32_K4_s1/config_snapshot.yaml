experiment:
  mode: target_dynamic
  run_id: dyn_p04_insects_to_non_insect_invertebrates_E32_K4_s1
  pair_group: main_strong_6
  pair_id: p04_insects_to_non_insect_invertebrates
  seed: 1
data:
  dataset_name: cifar100_superclass_task
  root: ./datasets
  val_ratio: 0.1
  num_classes: 5
  task_name: non_insect_invertebrates
  fine_classes:
  - crab
  - lobster
  - snail
  - spider
  - worm
transfer:
  enabled: false
  source_task: insects
  target_task: non_insect_invertebrates
  source_ref_run_id: ref_insects_E32_K4_s1
  source_stats_path: ''
  fixed_selection_rule: none
  fixed_k: 0
  dynamic_k: 4
model:
  feature_dim: 256
  moe:
    num_layers: 1
    expert_mlp_hidden_dim: 512
    num_experts: 32
    top_k: 4
  classifier:
    in_dim: 256
    out_dim: 5
train:
  epochs: 10
  batch_size: 128
  optimizer:
    lr: 0.001
    weight_decay: 0.0001
runtime:
  project_root: .
  save_dir: results/runs
  checkpoint_dir: checkpoints
  log_dir: logs
  num_workers: 2
